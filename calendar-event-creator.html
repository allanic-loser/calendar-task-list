<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google Calendar Event Creator</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #f0f2f5;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #1a1a2e;
    }

    .container {
      background: #ffffff;
      border-radius: 20px;
      box-shadow: 0 4px 40px rgba(0,0,0,0.10);
      padding: 2.5rem 2rem;
      width: 100%;
      max-width: 520px;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 2rem;
    }

    .cal-icon {
      width: 40px;
      height: 40px;
      background: #1a73e8;
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .cal-icon svg { width: 22px; height: 22px; fill: #fff; }

    h1 {
      font-size: 20px;
      font-weight: 600;
      color: #1a1a2e;
    }

    .form-group {
      margin-bottom: 1.1rem;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #666;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 5px;
    }

    input[type="text"],
    input[type="date"],
    input[type="time"],
    textarea,
    select {
      width: 100%;
      padding: 10px 13px;
      border: 1.5px solid #e0e4ed;
      border-radius: 10px;
      font-family: inherit;
      font-size: 14px;
      color: #1a1a2e;
      background: #fafbfc;
      outline: none;
      transition: border-color 0.2s;
    }

    input:focus, textarea:focus, select:focus {
      border-color: #1a73e8;
      background: #fff;
    }

    textarea {
      height: 80px;
      resize: vertical;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .allday-row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 1.1rem;
    }

    .allday-row input[type="checkbox"] {
      width: 17px;
      height: 17px;
      accent-color: #1a73e8;
      cursor: pointer;
    }

    .allday-row label {
      text-transform: none;
      letter-spacing: 0;
      font-size: 14px;
      font-weight: 400;
      color: #1a1a2e;
      margin: 0;
      cursor: pointer;
    }

    .divider {
      border: none;
      border-top: 1.5px solid #f0f2f5;
      margin: 1.5rem 0;
    }

    #submit-btn {
      width: 100%;
      padding: 13px;
      background: #1a73e8;
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: inherit;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s, transform 0.1s;
      margin-top: 0.5rem;
    }

    #submit-btn:hover { background: #1558c0; }
    #submit-btn:active { transform: scale(0.98); }
    #submit-btn:disabled { background: #9db8e8; cursor: not-allowed; transform: none; }

    .status {
      display: none;
      padding: 11px 14px;
      border-radius: 10px;
      font-size: 13.5px;
      margin-top: 1rem;
      line-height: 1.5;
    }

    .status.success {
      display: block;
      background: #e8f5e9;
      color: #2e7d32;
      border: 1.5px solid #a5d6a7;
    }

    .status.error {
      display: block;
      background: #ffebee;
      color: #c62828;
      border: 1.5px solid #ef9a9a;
    }

    .status.loading {
      display: block;
      background: #e8f0fe;
      color: #1a73e8;
      border: 1.5px solid #aecbfa;
    }

    .status a {
      color: inherit;
      font-weight: 600;
      text-decoration: underline;
    }

    .note {
      font-size: 12px;
      color: #999;
      text-align: center;
      margin-top: 1rem;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="cal-icon">
      <svg viewBox="0 0 24 24"><path d="M19 4h-1V2h-2v2H8V2H6v2H5C3.89 4 3 4.9 3 6v14a2 2 0 002 2h14a2 2 0 002-2V6a2 2 0 00-2-2zm0 16H5V9h14v11zM7 11h5v5H7z"/></svg>
    </div>
    <h1>Add to Google Calendar</h1>
  </div>

  <div class="form-group">
    <label for="title">Event title *</label>
    <input type="text" id="title" placeholder="e.g. Team standup" />
  </div>

  <div class="form-group">
    <label for="description">Description</label>
    <textarea id="description" placeholder="What's this event about?"></textarea>
  </div>

  <div class="form-group">
    <label for="location">Location</label>
    <input type="text" id="location" placeholder="e.g. Office, Zoom link..." />
  </div>

  <hr class="divider" />

  <div class="allday-row">
    <input type="checkbox" id="allday" onchange="toggleAllDay()" />
    <label for="allday">All-day event</label>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="start-date">Start date *</label>
      <input type="date" id="start-date" />
    </div>
    <div class="form-group" id="start-time-group">
      <label for="start-time">Start time *</label>
      <input type="time" id="start-time" />
    </div>
  </div>

  <div class="row">
    <div class="form-group">
      <label for="end-date">End date *</label>
      <input type="date" id="end-date" />
    </div>
    <div class="form-group" id="end-time-group">
      <label for="end-time">End time *</label>
      <input type="time" id="end-time" />
    </div>
  </div>

  <div class="form-group">
    <label for="calendar-select">Calendar</label>
    <select id="calendar-select">
      <option value="primary">Primary calendar</option>
    </select>
  </div>

  <button id="submit-btn" onclick="createEvent()">Add to Google Calendar</button>

  <div id="status" class="status"></div>

  <p class="note">Requires Google Calendar connected via Anthropic MCP</p>
</div>

<script>
  // ─── Pre-fill today's date and next hour ───────────────────────────────────
  const now = new Date();
  const pad = n => String(n).padStart(2, '0');
  const today = `${now.getFullYear()}-${pad(now.getMonth() + 1)}-${pad(now.getDate())}`;
  const h1 = (now.getHours() + 1) % 24;
  const h2 = (now.getHours() + 2) % 24;

  document.getElementById('start-date').value = today;
  document.getElementById('end-date').value = today;
  document.getElementById('start-time').value = `${pad(h1)}:00`;
  document.getElementById('end-time').value = `${pad(h2)}:00`;

  // ─── Toggle all-day mode ───────────────────────────────────────────────────
  function toggleAllDay() {
    const isAll = document.getElementById('allday').checked;
    document.getElementById('start-time-group').style.display = isAll ? 'none' : '';
    document.getElementById('end-time-group').style.display = isAll ? 'none' : '';
  }

  // ─── Status helper ────────────────────────────────────────────────────────
  function showStatus(msg, type) {
    const el = document.getElementById('status');
    el.innerHTML = msg;
    el.className = `status ${type}`;
  }

  // ─── Create event via Anthropic API + Google Calendar MCP ─────────────────
  async function createEvent() {
    const title       = document.getElementById('title').value.trim();
    const description = document.getElementById('description').value.trim();
    const location    = document.getElementById('location').value.trim();
    const startDate   = document.getElementById('start-date').value;
    const endDate     = document.getElementById('end-date').value;
    const startTime   = document.getElementById('start-time').value;
    const endTime     = document.getElementById('end-time').value;
    const allDay      = document.getElementById('allday').checked;
    const calendarId  = document.getElementById('calendar-select').value;

    // Basic validation
    if (!title)               { showStatus('Please enter an event title.', 'error'); return; }
    if (!startDate || !endDate) { showStatus('Please fill in the start and end dates.', 'error'); return; }
    if (!allDay && (!startTime || !endTime)) { showStatus('Please fill in the start and end times.', 'error'); return; }

    // Build ISO strings
    let startStr, endStr;
    if (allDay) {
      startStr = startDate;
      const endD = new Date(endDate);
      endD.setDate(endD.getDate() + 1);
      endStr = endD.toISOString().split('T')[0];
    } else {
      startStr = `${startDate}T${startTime}:00`;
      endStr   = `${endDate}T${endTime}:00`;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    showStatus('Creating your event...', 'loading');

    try {
      const response = await fetch('https://api.anthropic.com/v1/messages', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 1000,
          messages: [{
            role: 'user',
            content: `Create a Google Calendar event with these details:
Title: ${title}
${description ? 'Description: ' + description : ''}
${location    ? 'Location: '    + location    : ''}
Start: ${startStr}
End: ${endStr}
All-day: ${allDay}
Calendar ID: ${calendarId}

Use the Google Calendar MCP tool to create this event. Then respond ONLY with a raw JSON object (no markdown, no backticks):
{"success": true, "eventLink": "https://...", "eventId": "..."}
or
{"success": false, "error": "reason"}`
          }],
          mcp_servers: [{
            type: 'url',
            url:  'https://gcal.mcp.claude.com/mcp',
            name: 'gcal'
          }]
        })
      });

      const data = await response.json();

      // Extract text from response
      const textBlocks = (data.content || [])
        .filter(b => b.type === 'text')
        .map(b => b.text)
        .join('');

      let result = null;
      try {
        const clean = textBlocks.replace(/```json|```/g, '').trim();
        result = JSON.parse(clean);
      } catch (_) { /* fall through */ }

      if (result && result.success) {
        let msg = `✓ Event "<strong>${title}</strong>" created!`;
        if (result.eventLink) msg += ` <a href="${result.eventLink}" target="_blank">Open in Calendar →</a>`;
        showStatus(msg, 'success');
      } else if (result && result.error) {
        showStatus('Error: ' + result.error, 'error');
      } else if (textBlocks.toLowerCase().includes('created')) {
        showStatus(`✓ Event "<strong>${title}</strong>" created successfully!`, 'success');
      } else {
        showStatus('Could not create the event. Make sure Google Calendar is connected.', 'error');
      }

    } catch (err) {
      showStatus('Network error: ' + err.message, 'error');
    }

    btn.disabled = false;
  }
</script>

</body>
</html>
